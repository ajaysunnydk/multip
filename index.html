<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Join -->
<div id="joinScreen">
  <div class="join-logo">
    <div class="icon">💬</div>
    <h1>ChatRoom</h1>
    <p>Real-time chat with anyone, anywhere</p>
  </div>

  <div class="field">
    <label>Your Name</label>
    <input id="nameInput" type="text" placeholder="e.g. Your Name" maxlength="20"
      onkeydown="if(event.key==='Enter')joinChat()"/>
  </div>

  <div class="field">
    <label>Room ID</label>
    <input id="roomInput" type="text" placeholder="e.g. friends-hangout" maxlength="30"
      onkeydown="if(event.key==='Enter')joinChat()"/>
  </div>

  <div class="field">
    <label>Your Color</label>
    <div class="color-row" id="colorRow"></div>
  </div>

  <button class="join-btn" onclick="joinChat()">Join Room →</button>
</div>

<!-- Chat -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="room-avatar">💬</div>
      <div class="chat-header-center">
        <div class="room-name" id="headerRoom"></div>
        <div class="online-count">
          <span class="online-dot"></span>
          <span id="onlineCount">1 online</span>
        </div>
        <div id="searchBar" class="search-bar" style="display:none">
          <input id="searchInput" type="text" placeholder="Search messages…"
            oninput="searchMessages(this.value)"/>
          <button type="button" onclick="closeSearch()" aria-label="Close search">✕</button>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" id="btnSearch" class="icon-btn" title="Search">🔍</button>
      <button type="button" class="leave-btn" onclick="leaveChat()">Leave</button>
    </div>
  </div>

  <div class="members-strip" id="membersStrip"></div>
  <div id="messages"></div>
  <div id="typingBar"></div>

  <div id="replyBar" class="reply-bar" style="display:none">
    <div class="reply-preview">
      <div class="reply-line"></div>
      <div class="reply-content">
        <span class="reply-sender" id="replySender"></span>
        <span class="reply-text" id="replyText"></span>
      </div>
    </div>
    <button type="button" class="reply-close" onclick="cancelReply()" aria-label="Cancel reply">✕</button>
  </div>

  <div class="input-bar">
    <input type="file" id="imgUpload" accept="image/*" style="display:none"/>
    <button type="button" class="img-btn" title="Send image"
      onclick="document.getElementById('imgUpload').click()">🖼</button>
    <input id="msgInput" type="text" placeholder="Type a message..." maxlength="500"
      onkeydown="if(event.key==='Enter')sendMessage()"
      oninput="onTyping()"/>
    <button type="button" class="send-btn" onclick="sendMessage()" aria-label="Send">➤</button>
  </div>
</div>

<div id="ctxMenu" class="ctx-menu" style="display:none">
  <button type="button" class="ctx-item ctx-unsend" id="ctxUnsend">🗑 Unsend</button>
  <button type="button" class="ctx-item ctx-reply" id="ctxReply">↩ Reply</button>
  <button type="button" class="ctx-item ctx-react" id="ctxReact">😊 React</button>
  <div class="ctx-emoji-row" id="ctxEmojiRow">
    <span data-emoji="👍">👍</span>
    <span data-emoji="❤️">❤️</span>
    <span data-emoji="😂">😂</span>
    <span data-emoji="😮">😮</span>
    <span data-emoji="😢">😢</span>
    <span data-emoji="🔥">🔥</span>
  </div>
</div>

<div id="lightbox"><img alt="Full size"/></div>
<div id="uploadPreview" class="upload-preview" aria-live="polite"></div>

<script type="module" src="app.js"></script>
</body>
</html>
