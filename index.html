<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Auth -->
<div id="authScreen" class="screen">
  <div class="auth-card">
    <div class="join-logo">
      <div class="icon">💬</div>
      <h1>ChatRoom</h1>
      <p>Your private chat space</p>
    </div>

    <div class="field">
      <label>Your name</label>
      <input id="authName" type="text" placeholder="e.g. Alice" maxlength="20"
        autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('authPin').focus()"/>
    </div>

    <div class="field">
      <label>PIN (4–8 digits)</label>
      <div class="pin-row">
        <input id="authPin" type="password" inputmode="numeric"
          placeholder="••••" maxlength="8" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')handleAuth()"/>
        <button type="button" class="pin-toggle" id="pinToggle"
          onclick="togglePinVisibility()" aria-label="Show or hide PIN">👁</button>
      </div>
    </div>

    <div class="field">
      <label>Your color</label>
      <div class="color-row" id="colorRow"></div>
    </div>

    <div id="authError" class="auth-error" style="display:none"></div>

    <button type="button" class="join-btn" onclick="handleAuth()" id="authBtn">
      Continue →
    </button>

    <p class="auth-hint">New name = new account. Same name + PIN = login.</p>
  </div>
</div>

<!-- Home -->
<div id="homeScreen" class="screen">
  <div class="home-container">

    <div class="home-header">
      <div class="home-user">
        <div class="home-avatar" id="homeAvatar"></div>
        <div>
          <div class="home-name" id="homeName"></div>
          <div class="home-status">● Online</div>
        </div>
      </div>
      <button type="button" class="icon-btn logout-btn" title="Log out"
        onclick="logOut()">⎋</button>
    </div>

    <div class="home-tabs">
      <button type="button" class="tab-btn active" id="tabRooms"
        onclick="switchTab('rooms')">Rooms</button>
      <button type="button" class="tab-btn" id="tabDMs"
        onclick="switchTab('dms')">Direct Messages</button>
    </div>

    <div id="tabContentRooms" class="tab-content">
      <div class="section-label">Join or create a room</div>
      <div class="room-join-row">
        <input id="homeRoomInput" type="text"
          placeholder="Room ID (e.g. friends-hangout)"
          maxlength="30"
          onkeydown="if(event.key==='Enter')homeJoinRoom()"/>
        <button type="button" class="join-btn-sm" onclick="homeJoinRoom()">Join →</button>
      </div>
      <div class="section-label" style="margin-top:20px">Recent rooms</div>
      <div id="recentRoomsList" class="chat-list">
        <div class="chat-list-empty">No recent rooms yet</div>
      </div>
    </div>

    <div id="tabContentDMs" class="tab-content" style="display:none">
      <div class="section-label">Start a direct message</div>
      <div class="room-join-row">
        <input id="dmTargetName" type="text"
          placeholder="Enter exact username…"
          maxlength="20"
          onkeydown="if(event.key==='Enter')startDM()"/>
        <button type="button" class="join-btn-sm" onclick="startDM()">DM →</button>
      </div>
      <div class="section-label" style="margin-top:20px">Your DMs</div>
      <div id="dmList" class="chat-list">
        <div class="chat-list-empty">No DMs yet</div>
      </div>
    </div>

  </div>
</div>

<!-- Chat -->
<div id="chatScreen" class="screen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="room-avatar">💬</div>
      <div class="chat-header-center">
        <div class="room-name" id="headerRoom"></div>
        <div class="online-count">
          <span class="online-dot"></span>
          <span id="onlineCount">1 online</span>
        </div>
        <div id="searchBar" class="search-bar" style="display:none">
          <input id="searchInput" type="text" placeholder="Search messages…"
            oninput="searchMessages(this.value)"/>
          <button type="button" onclick="closeSearch()" aria-label="Close search">✕</button>
        </div>
      </div>
    </div>
    <div class="header-actions">
      <button type="button" id="btnSearch" class="icon-btn" title="Search">🔍</button>
      <button type="button" class="leave-btn" onclick="leaveChat()">Back</button>
    </div>
  </div>

  <div class="members-strip" id="membersStrip"></div>
  <div id="messages"></div>
  <div id="typingBar"></div>

  <div id="replyBar" class="reply-bar" style="display:none">
    <div class="reply-preview">
      <div class="reply-line"></div>
      <div class="reply-content">
        <span class="reply-sender" id="replySender"></span>
        <span class="reply-text" id="replyText"></span>
      </div>
    </div>
    <button type="button" class="reply-close" onclick="cancelReply()" aria-label="Cancel reply">✕</button>
  </div>

  <div class="input-bar">
    <input type="file" id="imgUpload" accept="image/*" style="display:none"/>
    <button type="button" class="img-btn" title="Send image"
      onclick="document.getElementById('imgUpload').click()">🖼</button>
    <input id="msgInput" type="text" placeholder="Type a message..." maxlength="500"
      onkeydown="if(event.key==='Enter')sendMessage()"
      oninput="onTyping()"/>
    <button type="button" class="send-btn" onclick="sendMessage()" aria-label="Send">➤</button>
  </div>
</div>

<div id="ctxMenu" class="ctx-menu" style="display:none">
  <button type="button" class="ctx-item ctx-unsend" id="ctxUnsend">🗑 Unsend</button>
  <button type="button" class="ctx-item ctx-reply" id="ctxReply">↩ Reply</button>
  <button type="button" class="ctx-item ctx-react" id="ctxReact">😊 React</button>
  <div class="ctx-emoji-row" id="ctxEmojiRow">
    <span data-emoji="👍">👍</span>
    <span data-emoji="❤️">❤️</span>
    <span data-emoji="😂">😂</span>
    <span data-emoji="😮">😮</span>
    <span data-emoji="😢">😢</span>
    <span data-emoji="🔥">🔥</span>
  </div>
</div>

<div id="lightbox"><img alt="Full size"/></div>
<div id="uploadPreview" class="upload-preview" aria-live="polite"></div>

<script type="module" src="app.js"></script>
</body>
</html>
