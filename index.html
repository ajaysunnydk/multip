<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In-Between | Multiplayer Card Game</title>
  <meta name="description" content="Real-time multiplayer In-Between card game. Create rooms, invite friends, and bet on card draws!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- ==================== LANDING SCREEN ==================== -->
  <div id="screen-landing" class="screen active">
    <div class="landing-container">
      <div class="logo-section">
        <div class="logo-suits">♠ ♥ ♦ ♣</div>
        <h1 class="logo-title">IN-BETWEEN</h1>
        <p class="logo-subtitle">The Card Game</p>
        <div class="logo-glow"></div>
      </div>

      <div class="name-section">
        <label for="player-name">Display Name</label>
        <input type="text" id="player-name" placeholder="Enter your name..." maxlength="15" autocomplete="off">
      </div>

      <div class="landing-panels">
        <!-- Create Room Panel -->
        <div class="panel panel-create">
          <div class="panel-header">
            <span class="panel-icon">🎰</span>
            <h3>Create Room</h3>
          </div>
          <div class="panel-body">
            <label>Base Value</label>
            <div class="base-value-grid">
              <button class="bv-chip" data-value="10">10</button>
              <button class="bv-chip active" data-value="20">20</button>
              <button class="bv-chip" data-value="50">50</button>
              <button class="bv-chip" data-value="100">100</button>
            </div>
            <div class="custom-bv-row">
              <input type="number" id="custom-base-value" placeholder="Custom..." min="1" max="10000">
            </div>
            <button id="btn-create-room" class="btn btn-gold">
              <span>Create Room</span>
              <span class="btn-shine"></span>
            </button>
          </div>
        </div>

        <div class="divider-or"><span>OR</span></div>

        <!-- Join Room Panel -->
        <div class="panel panel-join">
          <div class="panel-header">
            <span class="panel-icon">🚪</span>
            <h3>Join Room</h3>
          </div>
          <div class="panel-body">
            <label>Room Code</label>
            <input type="text" id="room-code-input" placeholder="Enter 6-digit code..." maxlength="6" autocomplete="off" style="text-transform:uppercase">
            <button id="btn-join-room" class="btn btn-emerald">
              <span>Join Room</span>
              <span class="btn-shine"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== LOBBY SCREEN ==================== -->
  <div id="screen-lobby" class="screen">
    <div class="lobby-container">
      <div class="lobby-header">
        <h2>🃏 Game Lobby</h2>
        <div class="room-code-box">
          <span class="rc-label">Room Code</span>
          <span id="lobby-room-code" class="rc-value">------</span>
          <button id="btn-copy-code" class="btn-icon" title="Copy code">📋</button>
        </div>
        <div class="lobby-meta">
          <span>Base Value: <strong id="lobby-base-value">20</strong></span>
          <span>•</span>
          <span>Players: <strong id="lobby-player-count">0</strong>/10</span>
        </div>
      </div>

      <div class="lobby-players" id="lobby-players">
        <!-- Dynamic player list -->
      </div>

      <div class="lobby-actions">
        <button id="btn-start-game" class="btn btn-gold" style="display:none">
          <span>🎲 Start Game</span>
          <span class="btn-shine"></span>
        </button>
        <button id="btn-leave-room" class="btn btn-danger">Leave Room</button>
      </div>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="screen-game" class="screen">
    <!-- Game Header -->
    <div class="game-header">
      <div class="gh-left">
        <span class="room-pill" id="game-room-code">ROOM</span>
        <span class="round-pill" id="game-round">Round 1</span>
      </div>
      <div class="gh-center">
        <div class="board-display">
          <span class="board-label">BOARD</span>
          <span class="board-amount" id="game-board-value">0</span>
        </div>
      </div>
      <div class="gh-right">
        <button id="btn-end-game" class="btn btn-danger btn-sm" style="display:none">End Game</button>
      </div>
    </div>

    <!-- Game Body -->
    <div class="game-body">
      <!-- Other Players -->
      <div class="other-players-strip" id="other-players"></div>

      <!-- Table Center -->
      <div class="table-center">
        <div class="deck-stack" id="deck-stack">
          <div class="card card-back deck-card">
            <div class="card-back-pattern">🂠</div>
          </div>
          <span class="deck-label"><span id="deck-count">104</span> cards</span>
        </div>

        <div class="arrow-indicator" id="draw-arrow" style="display:none">→</div>

        <div class="drawn-card-slot" id="drawn-card-slot">
          <span class="slot-label">Drawn Card</span>
        </div>
      </div>

      <!-- Your Cards -->
      <div class="your-cards-section" id="your-cards-section">
        <h3 class="section-label">Your Cards</h3>
        <div class="your-cards-row">
          <div class="your-card-wrapper">
            <span class="card-label">Face Down</span>
            <div id="my-card-1" class="card card-back">
              <div class="card-back-pattern">🂠</div>
            </div>
          </div>
          <div class="your-card-wrapper">
            <span class="card-label">Face Up</span>
            <div id="my-card-2" class="card card-back">
              <div class="card-back-pattern">🂠</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Action Panel -->
    <div class="action-panel" id="action-panel" style="display:none">
      <div class="action-top">
        <div class="turn-badge" id="turn-badge">Your Turn!</div>
        <div class="timer-ring" id="timer-ring">
          <svg viewBox="0 0 120 120">
            <circle class="timer-track" cx="60" cy="60" r="52"/>
            <circle class="timer-fill" cx="60" cy="60" r="52" id="timer-circle"/>
          </svg>
          <span class="timer-num" id="timer-text">20</span>
        </div>
      </div>
      <div class="action-buttons" id="action-main">
        <button id="btn-drop" class="btn btn-danger btn-action">✋ DROP</button>
        <button id="btn-bid" class="btn btn-gold btn-action">💰 PLACE BID</button>
      </div>
      <div class="bid-options" id="bid-options" style="display:none">
        <button class="btn btn-bid-opt" id="btn-full-board">Full Board <span class="opt-val"></span></button>
        <button class="btn btn-bid-opt" id="btn-half-board">Half Board <span class="opt-val"></span></button>
        <button class="btn btn-bid-opt" id="btn-base-half">50% Base <span class="opt-val"></span></button>
        <div class="custom-bid-row">
          <input type="number" id="custom-bid-input" placeholder="Amount..." min="1">
          <button class="btn btn-bid-opt" id="btn-custom-bid">GO</button>
        </div>
      </div>
    </div>

    <!-- Waiting Panel (shown when it's not your turn) -->
    <div class="waiting-panel" id="waiting-panel" style="display:none">
      <div class="waiting-text">
        <span class="waiting-dots">⏳</span>
        Waiting for <strong id="waiting-player-name">Player</strong>...
      </div>
      <div class="timer-ring timer-ring-sm" id="waiting-timer-ring">
        <svg viewBox="0 0 120 120">
          <circle class="timer-track" cx="60" cy="60" r="52"/>
          <circle class="timer-fill" cx="60" cy="60" r="52" id="waiting-timer-circle"/>
        </svg>
        <span class="timer-num" id="waiting-timer-text">20</span>
      </div>
    </div>

    <!-- Result Overlay -->
    <div class="result-overlay" id="result-overlay" style="display:none">
      <div class="result-box" id="result-box">
        <h2 id="result-title">WIN</h2>
        <p id="result-message">Details here</p>
        <div id="result-card-slot"></div>
      </div>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard" id="scoreboard"></div>
  </div>

  <!-- ==================== GAME OVER SCREEN ==================== -->
  <div id="screen-gameover" class="screen">
    <div class="gameover-container">
      <div class="gameover-header">
        <div class="logo-suits small">♠ ♥ ♦ ♣</div>
        <h2>Game Over</h2>
      </div>
      <div class="final-standings" id="final-standings"></div>
      <button id="btn-back-home" class="btn btn-gold">
        <span>Back to Home</span>
        <span class="btn-shine"></span>
      </button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
