<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChatRoom</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e12;
      --surface: #16161d;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --accent: #7c6aff;
      --accent-glow: rgba(124,106,255,0.2);
      --green: #3dd68c;
      --red: #ff6b6b;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* Join Screen */
    #joinScreen {
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .join-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .join-logo .icon {
      width: 64px; height: 64px;
      background: var(--accent);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 14px;
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .join-logo h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; }
    .join-logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .field input::placeholder { color: var(--muted); }

    .color-row { display: flex; gap: 8px; flex-wrap: wrap; }

    .color-opt {
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }
    .color-opt:hover { transform: scale(1.15); }
    .color-opt.selected { border-color: white; transform: scale(1.15); }

    .join-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .join-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .join-btn:active { transform: translateY(0); }

    /* Chat Screen */
    #chatScreen {
      display: none;
      width: 100%;
      max-width: 680px;
      height: 92vh;
      max-height: 780px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.35s ease;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      flex-shrink: 0;
    }

    .chat-header-left { display: flex; align-items: center; gap: 10px; }

    .room-avatar {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .room-name { font-weight: 600; font-size: 0.95rem; }

    .online-count {
      font-size: 0.78rem;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .online-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .leave-btn {
      padding: 6px 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .leave-btn:hover { border-color: var(--red); color: var(--red); }

    .members-strip {
      padding: 8px 20px;
      border-bottom: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      background: var(--bg);
      scrollbar-width: none;
    }
    .members-strip::-webkit-scrollbar { display: none; }

    .member-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px 3px 6px;
      background: var(--surface2);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .member-chip .av {
      width: 18px; height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-row.me { flex-direction: row-reverse; }

    .msg-av {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .msg-wrap { max-width: 70%; display: flex; flex-direction: column; }
    .msg-row.me .msg-wrap { align-items: flex-end; }

    .msg-sender { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }

    .msg-bubble {
      padding: 9px 14px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-row.them .msg-bubble {
      background: var(--surface2);
      border-bottom-left-radius: 4px;
    }

    .msg-row.me .msg-bubble {
      background: var(--accent);
      border-bottom-right-radius: 4px;
      color: white;
    }

    .msg-time { font-size: 0.68rem; color: var(--muted); margin-top: 3px; padding: 0 4px; }

    .msg-system {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 6px 0;
      font-style: italic;
    }

    .date-div {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      color: var(--muted);
      font-size: 0.72rem;
    }
    .date-div::before, .date-div::after { content:''; flex:1; height:1px; background: var(--border); }

    #typingBar {
      padding: 2px 20px 4px;
      font-size: 0.75rem;
      color: var(--muted);
      font-style: italic;
      min-height: 22px;
      flex-shrink: 0;
    }

    .input-bar {
      padding: 12px 16px;
      border-top: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    #msgInput {
      flex: 1;
      padding: 10px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #msgInput:focus { border-color: var(--accent); }
    #msgInput::placeholder { color: var(--muted); }

    .send-btn {
      width: 42px; height: 42px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<!-- Join -->
<div id="joinScreen">
  <div class="join-logo">
    <div class="icon">💬</div>
    <h1>ChatRoom</h1>
    <p>Real-time chat with anyone, anywhere</p>
  </div>

  <div class="field">
    <label>Your Name</label>
    <input id="nameInput" type="text" placeholder="e.g. Ajay" maxlength="20"
      onkeydown="if(event.key==='Enter')joinChat()"/>
  </div>

  <div class="field">
    <label>Room ID</label>
    <input id="roomInput" type="text" placeholder="e.g. friends-hangout" maxlength="30"
      onkeydown="if(event.key==='Enter')joinChat()"/>
  </div>

  <div class="field">
    <label>Your Color</label>
    <div class="color-row" id="colorRow"></div>
  </div>

  <button class="join-btn" onclick="joinChat()">Join Room →</button>
</div>

<!-- Chat -->
<div id="chatScreen">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="room-avatar">💬</div>
      <div>
        <div class="room-name" id="headerRoom"></div>
        <div class="online-count">
          <span class="online-dot"></span>
          <span id="onlineCount">1 online</span>
        </div>
      </div>
    </div>
    <button class="leave-btn" onclick="leaveChat()">Leave</button>
  </div>

  <div class="members-strip" id="membersStrip"></div>
  <div id="messages"></div>
  <div id="typingBar"></div>

  <div class="input-bar">
    <input id="msgInput" type="text" placeholder="Type a message..." maxlength="500"
      onkeydown="if(event.key==='Enter')sendMessage()"
      oninput="onTyping()"/>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, remove, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDQf-i8UH5wXc9Erz-clkrRi-byRbrwNE",
  authDomain: "multip-35e38.firebaseapp.com",
  databaseURL: "https://multip-35e38-default-rtdb.firebaseio.com",
  projectId: "multip-35e38",
  storageBucket: "multip-35e38.firebasestorage.app",
  messagingSenderId: "641663267611",
  appId: "1:641663267611:web:8c20f6b7a47657226e19be"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const COLORS = ["#7c6aff","#ff6b6b","#3dd68c","#ff9f43","#54a0ff","#fd79a8","#e17055","#00cec9","#a29bfe","#55efc4"];
let selectedColor = COLORS[0];
let myName, myColor, roomId, userId, presenceRef, typingRef, typingTimeout;

// Build color picker
const colorRow = document.getElementById("colorRow");
COLORS.forEach((c, i) => {
  const btn = document.createElement("div");
  btn.className = "color-opt" + (i === 0 ? " selected" : "");
  btn.style.background = c;
  btn.onclick = () => {
    document.querySelectorAll(".color-opt").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    selectedColor = c;
  };
  colorRow.appendChild(btn);
});

window.joinChat = function() {
  myName = document.getElementById("nameInput").value.trim();
  roomId = document.getElementById("roomInput").value.trim().replace(/\s+/g,"-").toLowerCase();
  myColor = selectedColor;
  if (!myName) return alert("Enter your name!");
  if (!roomId) return alert("Enter a room ID!");

  userId = Math.random().toString(36).slice(2,9);

  document.getElementById("joinScreen").style.display = "none";
  const cs = document.getElementById("chatScreen");
  cs.style.display = "flex";
  document.getElementById("headerRoom").textContent = "# " + roomId;

  // Presence
  presenceRef = ref(db, `chatrooms/${roomId}/members/${userId}`);
  set(presenceRef, { name: myName, color: myColor });

  typingRef = ref(db, `chatrooms/${roomId}/typing/${userId}`);

  // System join message
  push(ref(db, `chatrooms/${roomId}/messages`), { type:"system", text:`${myName} joined`, ts: Date.now() });

  listenMembers();
  listenMessages();
  listenTyping();

  setTimeout(() => document.getElementById("msgInput").focus(), 100);
};

function listenMembers() {
  onValue(ref(db, `chatrooms/${roomId}/members`), snap => {
    const data = snap.val() || {};
    const list = Object.values(data);
    document.getElementById("onlineCount").textContent = list.length + " online";
    const strip = document.getElementById("membersStrip");
    strip.innerHTML = "";
    list.forEach(m => {
      const chip = document.createElement("div");
      chip.className = "member-chip";
      const av = document.createElement("div");
      av.className = "av";
      av.style.background = m.color;
      av.textContent = m.name[0].toUpperCase();
      chip.appendChild(av);
      chip.appendChild(document.createTextNode(m.name === myName ? m.name + " (you)" : m.name));
      strip.appendChild(chip);
    });
  });
}

let lastDay = "";

function listenMessages() {
  onValue(ref(db, `chatrooms/${roomId}/messages`), snap => {
    if (!snap.exists()) return;
    const el = document.getElementById("messages");
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    el.innerHTML = "";
    lastDay = "";
    Object.values(snap.val()).forEach(renderMsg);
    if (atBottom) el.scrollTop = el.scrollHeight;
  });
}

function renderMsg(msg) {
  const el = document.getElementById("messages");
  const d = new Date(msg.ts);
  const dayStr = d.toDateString();

  if (dayStr !== lastDay) {
    lastDay = dayStr;
    const div = document.createElement("div");
    div.className = "date-div";
    const now = new Date();
    div.textContent = d.toDateString() === now.toDateString()
      ? "Today"
      : d.toLocaleDateString(undefined, {weekday:"long", month:"short", day:"numeric"});
    el.appendChild(div);
  }

  if (msg.type === "system") {
    const div = document.createElement("div");
    div.className = "msg-system";
    div.textContent = msg.text;
    el.appendChild(div);
    return;
  }

  const isMe = msg.uid === userId;
  const row = document.createElement("div");
  row.className = "msg-row " + (isMe ? "me" : "them");

  const av = document.createElement("div");
  av.className = "msg-av";
  av.style.background = msg.color || "#7c6aff";
  av.textContent = (msg.sender||"?")[0].toUpperCase();

  const wrap = document.createElement("div");
  wrap.className = "msg-wrap";

  if (!isMe) {
    const sn = document.createElement("div");
    sn.className = "msg-sender";
    sn.textContent = msg.sender;
    sn.style.color = msg.color || "var(--muted)";
    wrap.appendChild(sn);
  }

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.textContent = msg.text;

  const time = document.createElement("div");
  time.className = "msg-time";
  time.textContent = d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});

  wrap.appendChild(bubble);
  wrap.appendChild(time);

  if (isMe) { row.appendChild(wrap); row.appendChild(av); }
  else { row.appendChild(av); row.appendChild(wrap); }

  el.appendChild(row);
}

window.sendMessage = function() {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  clearTypingState();
  push(ref(db, `chatrooms/${roomId}/messages`), {
    type: "msg", text, sender: myName, uid: userId, color: myColor, ts: Date.now()
  });
};

window.onTyping = function() {
  set(typingRef, { name: myName, ts: Date.now() });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(clearTypingState, 2500);
};

function clearTypingState() {
  clearTimeout(typingTimeout);
  remove(typingRef);
}

function listenTyping() {
  onValue(ref(db, `chatrooms/${roomId}/typing`), snap => {
    const data = snap.val() || {};
    const others = Object.entries(data).filter(([id]) => id !== userId).map(([,v]) => v.name);
    const bar = document.getElementById("typingBar");
    if (!others.length) bar.textContent = "";
    else if (others.length === 1) bar.textContent = others[0] + " is typing...";
    else bar.textContent = others.join(", ") + " are typing...";
  });
}

window.leaveChat = function() {
  push(ref(db, `chatrooms/${roomId}/messages`), { type:"system", text:`${myName} left`, ts: Date.now() });
  clearTypingState();
  remove(presenceRef);
  off(ref(db, `chatrooms/${roomId}/messages`));
  off(ref(db, `chatrooms/${roomId}/members`));
  off(ref(db, `chatrooms/${roomId}/typing`));
  document.getElementById("chatScreen").style.display = "none";
  document.getElementById("joinScreen").style.display = "block";
  document.getElementById("messages").innerHTML = "";
};
</script>
</body>
</html>
